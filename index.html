<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لعبة طباخ النجوم</title>
    <style>
        /* CSS - تنسيق شكل اللعبة */
        body {
            font-family: 'Arial', sans-serif;
            background-color: #f0f8ff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        #game-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-align: center;
            width: 90%;
            max-width: 500px;
        }
        .ingredients {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
        }
        .item {
            padding: 10px;
            background: #ffe4e1;
            border: 2px solid #ff69b4;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }
        .item:hover { transform: scale(1.1); }
        #pot {
            font-size: 50px;
            margin: 20px;
            padding: 20px;
            border: 4px dashed #ccc;
            border-radius: 50%;
        }
        button {
            padding: 10px 20px;
            font-size: 18px;
            background: #4caf50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div id="game-container">
    <h1>👨‍🍳 مطبخ النجوم</h1>
    <p>اختر المكونات وضعها في القدر!</p>
    
    <div class="ingredients">
        <div class="item" onclick="addItem('🍅 طماطم')">🍅</div>
        <div class="item" onclick="addItem('🧀 جبنة')">🧀</div>
        <div class="item" onclick="addItem('🍞 خبز')">🍞</div>
        <div class="item" onclick="addItem('🥦 بروكلي')">🥦</div>
    </div>

    <div id="pot">🍲</div>
    <div id="recipe-list">المكونات: لا يوجد</div>
    <br>
    <button onclick="cook()">ابدأ الطبخ! 🔥</button>
    <p id="result"></p>
</div>

<script>
    // JavaScript - منطق اللعبة
    let ingredientsInPot = [];

    function addItem(item) {
        ingredientsInPot.push(item);
        document.getElementById('recipe-list').innerText = "المكونات: " + ingredientsInPot.join(' + ');
    }

    function cook() {
        const result = document.getElementById('result');
        if (ingredientsInPot.length === 0) {
            result.innerText = "القدر فارغ! أضف بعض المكونات أولاً.";
            return;
        }
        
        // محاكاة نتيجة الطبخ
        result.innerText = "جاري الطبخ... 🥣";
        setTimeout(() => {
            if (ingredientsInPot.includes('🍅 طماطم') && ingredientsInPot.includes('🧀 جبنة')) {
                result.innerText = "تهانينا! صنعت بيتزا رائعة! 🍕";
            } else {
                result.innerText = "لقد صنعت طبخة مبتكرة! طعمها غريب لكنه لذيذ! 😋";
            }
            ingredientsInPot = [];
            document.getElementById('recipe-list').innerText = "المكونات: لا يوجد";
        }, 1500);
    }
</script>

</body>
</html>
